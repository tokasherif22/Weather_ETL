version: '3.8'

x-airflow-common: &airflow-common
  # image: apache/airflow:2.8.1
  build: .
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # _PIP_ADDITIONAL_REQUIREMENTS: "pyspark==3.5.1 requests psycopg2-binary pandas pyarrow"
    POSTGRES_HOST: postgres
    POSTGRES_DB: weather_db
    POSTGRES_USER: airflow
    POSTGRES_PASSWORD: airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./spark_jobs:/opt/airflow/spark_jobs
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
    - ./requirements.txt:/requirements.txt
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/01_create_weather_db.sql:/docker-entrypoint-initdb.d/01_create_weather_db.sql
      - ./sql/02_create_table.sh:/docker-entrypoint-initdb.d/02_create_table.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
      airflow users create --username admin --password admin
      --firstname Admin --lastname User --role Admin
      --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  spark:
    image: apache/spark:3.5.1
    environment:
      - SPARK_MODE=master
    user: "0"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./spark_jobs:/opt/spark_jobs
      - ./data:/opt/airflow/data

volumes:
  postgres_data: